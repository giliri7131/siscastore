<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiscaStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFDE00;
            --secondary: #ee4d2d;
            --accent: #00E5FF;
            --dark: #1A1A1A;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--primary); 
            background-image: radial-gradient(var(--dark) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            overflow-x: hidden; 
            transition: background 0.3s ease;
        } 

        body.dark-mode {
            background-color: #121212;
            color: white;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
        }
        
        /* Hiasan 1: Floating Shapes */
        .shape {
            position: fixed;
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite alternate ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0); }
            100% { transform: translateY(-50px) rotate(20deg); }
        }

        .neubrutal-box {
            background: white;
            border: 4px solid var(--dark);
            box-shadow: 8px 8px 0px var(--dark);
        }

        .product-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Hiasan 3: Hover Effect */
        .product-card:hover {
            transform: scale(1.02) rotate(-1deg);
            box-shadow: 20px 20px 0px var(--dark);
        }

        .marquee-container {
            background: var(--dark);
            border-bottom: 4px solid black;
            overflow: hidden;
            display: flex;
        }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
            padding: 12px 0;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .variant-btn.active {
            background-color: var(--dark) !important;
            color: white !important;
            transform: translate(2px, 2px);
            box-shadow: none !important;
        }

        .desc-text {
            white-space: pre-line;
        }

        /* Hiasan 5: Neon Glow */
        .buy-btn {
            box-shadow: 5px 5px 0px var(--dark);
            transition: all 0.2s;
        }
        .buy-btn:hover {
            box-shadow: 0px 0px 15px var(--secondary);
            background-color: white;
            color: var(--secondary);
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { 
            background: var(--secondary); 
            border: 3px solid var(--dark);
        }
    </style>
</head>
<body class="pb-24">

    <div class="shape w-32 h-32 bg-red-400 top-20 left-10 rounded-full"></div>
    <div class="shape w-24 h-24 bg-blue-400 bottom-40 right-10" style="animation-delay: -2s;"></div>

    <div class="marquee-container sticky top-0 z-[60]">
        <div class="marquee-content font-extrabold text-sm text-white uppercase italic tracking-widest">
            <span class="mx-4 text-yellow-400">🚀 SISCASTORE EXCLUSIVE</span> 
            <span class="mx-4 underline">⚡ FAST RESPON</span> 
            <span class="mx-4 text-green-400">🔒 100% TRUSTED</span> 
            <span class="mx-4">💸 HARGA TERMURAH</span>
            <span class="mx-4 text-yellow-400">🚀 SISCASTORE EXCLUSIVE</span> 
            <span class="mx-4 underline">⚡ FAST RESPON</span> 
        </div>
    </div>

    <header class="bg-white/80 backdrop-blur-md border-b-4 border-black p-6 sticky top-10 z-[50]">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <h1 class="text-5xl font-black italic tracking-tighter text-black uppercase">
                    SISCA<span class="text-[#ee4d2d]">STORE</span>
                </h1>
                <p id="liveClock" class="font-bold text-xs mt-1 text-gray-500 uppercase"></p>
            </div>
            
            <div class="flex gap-4 items-center w-full max-w-md">
                <input type="text" id="searchInput" oninput="searchProduct()" placeholder="🔍 Cari nama produk..." 
                class="flex-1 p-4 font-bold border-4 border-black shadow-[6px_6px_0px_black] outline-none focus:shadow-none transition-all">
                
                <button onclick="toggleDarkMode()" class="bg-black text-white p-4 border-4 border-black shadow-[4px_4px_0px_white]">🌓</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-12 px-4 flex flex-col lg:flex-row gap-10">
        
        <div id="admin-panel" class="hidden w-full lg:w-[450px]">
            <div class="bg-white p-6 border-4 border-black shadow-[10px_10px_0px_black] sticky top-48">
                <h3 id="form-title" class="text-2xl font-black mb-4 uppercase border-b-4 border-black inline-block">Kelola Produk</h3>
                
                <div class="space-y-4 text-black">
                    <input type="hidden" id="edit-index">
                    <input type="text" id="pName" placeholder="Nama Produk" class="w-full p-3 border-4 border-black font-bold outline-none">
                    <textarea id="pDesc" placeholder="Deskripsi (Gunakan Enter untuk baris baru)" class="w-full p-3 border-4 border-black font-bold h-32 outline-none"></textarea>
                    
                    <div class="border-4 border-black p-3 bg-gray-50">
                        <label class="block text-xs font-black mb-2">VARIAN & HARGA</label>
                        <div id="variant-inputs" class="space-y-2 mb-3"></div>
                        <button onclick="addVariantInput()" class="w-full bg-cyan-400 border-2 border-black font-black text-xs py-1">+ TAMBAH JENIS</button>
                    </div>

                    <input type="file" id="pImage" accept="image/*" class="w-full text-sm font-bold border-4 border-black p-2 bg-white">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="saveProduct()" class="bg-[#ee4d2d] text-white py-3 font-black border-4 border-black shadow-[4px_4px_0px_black] active:shadow-none">SIMPAN</button>
                        <button onclick="resetForm()" class="bg-gray-200 py-3 font-black border-4 border-black">BATAL</button>
                    </div>
                </div>

                <div class="mt-10 pt-6 border-t-4 border-black">
                    <h3 class="text-xl font-black mb-4 uppercase text-blue-600">Input Penjualan</h3>
                    <div class="space-y-3">
                        <input type="text" id="custName" placeholder="Nama Pembeli" class="w-full p-2 border-2 border-black font-bold outline-none">
                        <input type="text" id="custProd" placeholder="Jenis Produk" class="w-full p-2 border-2 border-black font-bold outline-none">
                        <input type="number" id="custPrice" placeholder="Harga" class="w-full p-2 border-2 border-black font-bold outline-none">
                        <button onclick="addIncome()" class="w-full bg-green-400 font-black py-2 border-4 border-black shadow-[3px_3px_0px_black]">SIMPAN ORDER</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1">
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
        </div>
    </main>

    <footer class="container mx-auto px-4 mt-10">
        <div class="bg-black text-white p-8 border-4 border-white shadow-[10px_10px_0px_#ee4d2d] flex flex-col md:flex-row items-center gap-6 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full"></div>
            
            <div class="w-24 h-24 bg-yellow-400 border-4 border-white rotate-3 flex items-center justify-center text-4xl z-10">👩‍💻</div>
            <div class="text-center md:text-left z-10">
                <h2 class="text-2xl font-black uppercase">Fitri Maharani Valerina (Owner)</h2>
                <p class="text-gray-400 font-bold">Proses Cepat • Amanah • Garansi Full.</p>
            </div>
        </div>
    </footer>

    <div id="stats-modal" class="hidden fixed inset-0 bg-black/90 z-[100] p-6 overflow-y-auto">
        <div class="bg-white max-w-2xl mx-auto p-8 border-4 border-black shadow-[10px_10px_0px_#ee4d2d] text-black">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-4xl font-black uppercase italic">📊 LAPORAN CUAN</h2>
                <button onclick="toggleStats()" class="text-2xl font-black">X</button>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-yellow-400 p-4 border-4 border-black">
                    <p class="font-black text-xs uppercase">Total Order</p>
                    <p id="stat-count" class="text-3xl font-black italic">0</p>
                </div>
                <div class="bg-green-400 p-4 border-4 border-black">
                    <p class="font-black text-xs uppercase">Total Uang</p>
                    <p id="stat-money" class="text-3xl font-black italic">Rp 0</p>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b-4 border-black">
                            <th class="p-2 font-black uppercase">Pembeli</th>
                            <th class="p-2 font-black uppercase">Varian</th>
                            <th class="p-2 font-black uppercase">Harga</th>
                        </tr>
                    </thead>
                    <tbody id="income-list" class="font-bold"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 flex flex-col gap-3 z-[70]">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="bg-white border-4 border-black p-4 font-black shadow-[4px_4px_0px_black]">⬆️</button>
        <button id="btn-stats" onclick="toggleStats()" class="hidden bg-blue-500 text-white p-4 border-4 border-black shadow-[4px_4px_0px_black] font-black italic">💰 CUAN</button>
        <button id="btn-login" onclick="toggleLogin()" class="bg-black text-white p-4 border-4 border-white shadow-[4px_4px_0px_black] font-black uppercase">🔑 Admin Login</button>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('sisca_products')) || [];
        let incomes = JSON.parse(localStorage.getItem('sisca_incomes')) || [];
        let isAdmin = false;
        let selectedVariants = {}; 

        // Fitur 3: Live Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleString('id-ID', { dateStyle: 'full', timeStyle: 'medium' });
        }, 1000);

        // Fitur 1: Dark Mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        window.onload = () => { 
            renderProducts(); 
            updateStats(); 
            addVariantInput();
        };

        function addVariantInput(valName = '', valPrice = '') {
            const container = document.getElementById('variant-inputs');
            const div = document.createElement('div');
            div.className = "flex gap-2";
            div.innerHTML = `
                <input type="text" placeholder="Jenis" class="v-name w-1/2 p-1 border-2 border-black text-xs font-bold" value="${valName}">
                <input type="text" placeholder="Harga" class="v-price w-1/2 p-1 border-2 border-black text-xs font-bold" value="${valPrice}">
                <button onclick="this.parentElement.remove()" class="text-red-600 font-black">X</button>
            `;
            container.appendChild(div);
        }

        function saveProduct() {
            const name = document.getElementById('pName').value;
            const desc = document.getElementById('pDesc').value;
            const imgInput = document.getElementById('pImage');
            const editIdx = document.getElementById('edit-index').value;
            
            const vNames = document.querySelectorAll('.v-name');
            const vPrices = document.querySelectorAll('.v-price');
            let variants = [];
            vNames.forEach((n, i) => {
                if(n.value) variants.push({ name: n.value, price: vPrices[i].value });
            });

            if(!name || variants.length === 0) return alert("Minimal isi Nama & 1 Jenis Produk!");

            const doSave = (imgSrc) => {
                const data = { name, desc, variants, image: imgSrc || 'https://via.placeholder.com/400x300' };
                if(editIdx === "") products.push(data);
                else {
                    if(!imgSrc) data.image = products[editIdx].image;
                    products[editIdx] = data;
                }
                localStorage.setItem('sisca_products', JSON.stringify(products));
                resetForm(); 
                renderProducts();
                alert("Berhasil!");
            };

            if(imgInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => doSave(e.target.result);
                reader.readAsDataURL(imgInput.files[0]);
            } else { doSave(null); }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            if (products.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center p-10 bg-white border-4 border-dashed border-black font-black uppercase text-gray-400">Database Kosong.</div>`;
                return;
            }

            products.forEach((p, i) => {
                let variantHtml = p.variants.map((v, vi) => `
                    <button onclick="selectVariant(${i}, ${vi}, '${v.name}', '${v.price}')" 
                        id="v-btn-${i}-${vi}"
                        class="variant-btn bg-white border-2 border-black px-3 py-1 text-xs font-black shadow-[2px_2px_0px_black] text-black">
                        ${v.name}
                    </button>
                `).join('');

                grid.innerHTML += `
                    <div class="product-card bg-white border-4 border-black p-6 flex flex-col shadow-[10px_10px_0px_black] relative text-black">
                        <div class="absolute -top-4 -left-4 bg-accent border-4 border-black px-3 py-1 font-black transform -rotate-12">#${i+1}</div>
                        
                        <img src="${p.image}" class="w-full h-48 object-cover border-4 border-black mb-4 bg-gray-100">
                        <h3 class="text-2xl font-black uppercase italic product-title">${p.name}</h3>
                        <p class="desc-text font-bold text-gray-600 text-sm mb-4">${p.desc}</p>
                        
                        <p class="text-[10px] font-black uppercase mb-2">Pilih Jenis:</p>
                        <div class="flex flex-wrap gap-2 mb-6">${variantHtml}</div>

                        <div id="price-tag-${i}" class="mb-4 text-3xl font-black text-[#ee4d2d]">Rp -</div>

                        <div class="flex gap-2">
                            <button onclick="buyWA(${i})" class="buy-btn flex-1 bg-[#FFDE00] border-4 border-black py-4 font-black text-lg uppercase">BELI SEKARANG ➜</button>
                            <button onclick="shareProduct(${i})" class="bg-white border-4 border-black px-4">🔗</button>
                        </div>
                        
                        ${isAdmin ? `
                            <div class="flex gap-2 mt-4 pt-4 border-t-2 border-black border-dashed">
                                <button onclick="editProduct(${i})" class="bg-blue-400 w-full font-black border-2 border-black text-xs py-1">EDIT</button>
                                <button onclick="deleteProduct(${i})" class="bg-red-400 w-full font-black border-2 border-black text-xs py-1 text-white">HAPUS</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        }

        // Fitur 2: Share Product
        function shareProduct(i) {
            const p = products[i];
            const text = `Cek produk keren ini di SiscaStore: ${p.name}!`;
            if (navigator.share) {
                navigator.share({ title: 'SiscaStore', text: text, url: window.location.href });
            } else {
                alert("Link disalin ke clipboard!");
            }
        }

        function selectVariant(pIdx, vIdx, vName, vPrice) {
            selectedVariants[pIdx] = { name: vName, price: vPrice };
            const container = document.getElementById(`v-btn-${pIdx}-${vIdx}`).parentElement;
            container.querySelectorAll(`.variant-btn`).forEach(b => b.classList.remove('active'));
            document.getElementById(`v-btn-${pIdx}-${vIdx}`).classList.add('active');
            document.getElementById(`price-tag-${pIdx}`).innerText = "Rp " + vPrice;
        }

        function buyWA(pIdx) {
            const sel = selectedVariants[pIdx];
            if(!sel) return alert("Pilih jenis dulu!");
            const text = `Halo Admin SiscaStore!\nMau order:\n\nProduk: ${products[pIdx].name}\nJenis: ${sel.name}\nHarga: Rp ${sel.price}`;
            window.open(`https://wa.me/082142436618?text=${encodeURIComponent(text)}`);
        }

        function toggleLogin() {
            if(isAdmin) {
                // Fitur 5: Logout Clean
                isAdmin = false;
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('btn-stats').classList.add('hidden');
                document.getElementById('btn-login').innerText = "🔑 ADMIN LOGIN";
                renderProducts();
                return;
            }
            const pass = prompt("Password Admin:");
            if(pass === "455610") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('btn-stats').classList.remove('hidden');
                document.getElementById('btn-login').innerText = "🔓 LOGOUT";
                renderProducts();
            } else { alert("Salah!"); }
        }

        function searchProduct() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const title = card.querySelector('.product-title').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "flex" : "none";
            });
        }

        function addIncome() {
            const name = document.getElementById('custName').value;
            const prod = document.getElementById('custProd').value;
            const price = parseInt(document.getElementById('custPrice').value);
            if(!name || !prod || !price) return alert("Lengkapi data!");
            incomes.push({ name, prod, price });
            localStorage.setItem('sisca_incomes', JSON.stringify(incomes));
            alert("Order Tersimpan!");
            updateStats();
        }

        function updateStats() {
            const total = incomes.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('stat-count').innerText = incomes.length;
            document.getElementById('stat-money').innerText = "Rp " + total.toLocaleString();
            document.getElementById('income-list').innerHTML = incomes.map(item => `
                <tr class="border-b border-gray-200"><td class="p-2">${item.name}</td><td class="p-2">${item.prod}</td><td class="p-2 text-green-600">Rp ${item.price.toLocaleString()}</td></tr>
            `).join('');
        }

        function toggleStats() { document.getElementById('stats-modal').classList.toggle('hidden'); }

        function editProduct(idx) {
            const p = products[idx];
            document.getElementById('pName').value = p.name;
            document.getElementById('pDesc').value = p.desc;
            document.getElementById('edit-index').value = idx;
            const container = document.getElementById('variant-inputs');
            container.innerHTML = '';
            p.variants.forEach(v => addVariantInput(v.name, v.price));
            document.getElementById('admin-panel').scrollIntoView({ behavior: 'smooth' });
        }

        function deleteProduct(idx) {
            if(confirm("Hapus?")) {
                products.splice(idx, 1);
                localStorage.setItem('sisca_products', JSON.stringify(products));
                renderProducts();
            }
        }

        function resetForm() {
            document.getElementById('pName').value = "";
            document.getElementById('pDesc').value = "";
            document.getElementById('variant-inputs').innerHTML = "";
            document.getElementById('edit-index').value = "";
            addVariantInput();
        }
    </script>
</body>
</html>
